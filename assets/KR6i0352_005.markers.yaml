  - {type: variant, offset: 3025, length: 135, content: 「文殊師利！行相第一義諦、執著第一義諦、邪行第一義諦，此三第一義諦一切眾生平等無差別。文殊師利！相第一義諦、唯識第一義諦，此二第一義諦一切法平等無差別。文殊師利！清淨第一義諦，聲聞、緣覺、菩薩阿耨多羅三藐三菩提平等無差別。「文殊師利！正修行第一義諦，如聞妙法差別，觀奢摩他、毘婆舍那【CB】【麗-CB】，耶【大】那K10n0153_p0704a03耶攝取般若波羅蜜平等無差別應知。」, 宋: '', 元: '', 明: '', 宮: '', 聖: '', 聖乙: ''}
