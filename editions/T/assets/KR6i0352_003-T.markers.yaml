  - {type: variant, offset: 1644, length: 30, content: 利根菩薩作如是說。彌勒！不依止法隨順他教，而我為彼軟根菩薩作如是說, 宋: 我說名為利根菩薩彌勒依止奢摩他毘婆舍那隨順他教我說名為鈍根菩薩, 元: 我說名為利根菩薩彌勒依止奢摩他毘婆舍那隨順他教我說名為鈍根菩薩, 明: 我說名為利根菩薩彌勒依止奢摩他毘婆舍那隨順他教我說名為鈍根菩薩, 宮: 我說名為利根菩薩彌勒依止奢摩他毘婆舍那隨順他教我說名為鈍根菩薩, 聖: 我說名為利根菩薩作如是說彌勒不依止法奢摩他毘婆舍那隨順他教而我為彼鈍根菩薩作如是說, 聖乙: 我說名為利根菩薩作如是說彌勒不依止法奢摩他毘婆舍那隨順他教而我為彼鈍根菩薩作如是說}
