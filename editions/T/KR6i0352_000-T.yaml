body:
  text: 深密解脫經序沙門都釋曇寧造夫至迹虛微理包言像之外幽宗沖祕旨絕名相之域是以大聖秉獨悟之靈姿鏡寰中之妙趣實相廓然與虛無齊其量法性憺爾與幽冥同其源神輝潛映而不滅萬相俱應而不生然此生也生所不能生此之滅也滅所不能滅顯既非有隱豈為無寂焉而動動焉而寂出沒無方教迹星羅者矣蓋深密解脫經者乃兆聖之玄源億善之淵府論其旨也則真相不二語其教也則湛然理一義盡沖籍文窮祕典妙絕熈怡包括群藏自非詮于理教何以顯茲深致但東西音殊理憑翻譯非翻非譯文義斯壅所以久蘊而不顯者良俟嘉運而光通矣大魏皇帝總六合以統天包百王以馭宇道邁羲唐德超古哲而每遊神覺典妙翫大乘思在翻演鴻宣遐代時有北天竺三藏法師菩提留支魏音道晞曾為此地之沙門都統也識性內融神機外朗沖文玄藏罔不該洞以永熈二年龍次星紀月呂蕤賓詔命三藏於顯陽殿高陞法座披匣揮麈口自翻譯義語無滯皇上尊經祇法執翰輪首下筆成句文義雙顯旨包群籍之祕理含眾典之奧但萬機淵曠無容終訖捨筆之後轉授沙門都法師慧光曇寧在永寧上寺共律師僧辯居士李廓等遵承上軌歲常翻演新經諸論津悟恒沙帝亦時紆尊儀飾茲玄席同事名儒招玄大統法師僧令沙門都法師僧澤律師慧顒等十有餘僧緇俗詵詵法事隆盛一言三覆慕盡窮微是使深密祕藏光宣於景運解脫妙義永流於遐劫理教淵廓罔測其源旨趣中絕焉究其宗所謂鹿苑之唱再興祇園之風更顯者也寧雖識昧忝廁倫末敢罄庸管祇記云爾
